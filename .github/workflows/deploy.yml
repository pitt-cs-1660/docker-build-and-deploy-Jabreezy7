name: Build and Push to ECR

on:
  push:
    branches: [main]

env:
  ACCOUNT_ID: "929767730298"
  REGION: "us-east-1"
  REPO_NAME: "cs1660-assignment2"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: login to amazon ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: build, tag, and push to ecr
        run: | 
          docker build -t cs1660-assignment2:latest .
          docker tag cs1660-assignment2:latest 929767730298.dkr.ecr.us-east-1.amazonaws.com/cs1660-assignment2:latest
          docker push 929767730298.dkr.ecr.us-east-1.amazonaws.com/cs1660-assignment2:latest
